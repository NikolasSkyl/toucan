name = "todo_json_api"
version = "0.1.0"
description = "Todo REST API — JSON responses, SQLite storage"

[dependencies]
donna   = { git = "https://github.com/donna-lang/donna_stdlib",  version = ">=0.2.0 and <1.0.0" }
toucan  = { path = "../.." }
mongoose = { git = "https://github.com/NikolasSkyl/mongoose", version = ">=0.2.0 and <1.0.0" }
sqlite  = { git = "https://github.com/donna-lang/sqlite",        version = ">=0.1.1 and <1.0.0" }
json    = { git = "https://github.com/donna-lang/json",          version = ">=0.1.0 and <1.0.0" }
