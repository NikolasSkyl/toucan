<!doctype html>
<html lang="en">
{{> head}}
<body>
  {{> header}}

  <main>
    <div class="article-wrap">
      <header class="article-header">
        <a href="/chronicles/" class="article-header__back">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Chronicles
        </a>
        <h1>{{title}}</h1>
        <div class="article-header__meta">
          <time class="article-header__date">{{date}}</time>
          <span class="article-header__read">{{read_time_label}}</span>
          <div class="tags"><span class="tag">{{article_tag}}</span></div>
        </div>
      </header>

      <article class="prose">
        {{{content}}}
      </article>

      <footer class="article-footer">
        <a href="/chronicles/" class="article-footer__back">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to Chronicles
        </a>
      </footer>
    </div>
  </main>

  {{> footer}}
</body>
</html>
