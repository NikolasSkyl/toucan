name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "donna.toml"
      - "donna.lock"
      - "src/**"
      - "ffi/**"
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache QBE
        id: qbe-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/qbe
          key: qbe-official-git-${{ runner.os }}-2026-05-18

      - name: Install QBE
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          if command -v qbe >/dev/null 2>&1; then
            qbe --version || true
            exit 0
          fi
          sudo apt-get update
          if apt-cache show qbe >/dev/null 2>&1; then
            sudo apt-get install -y qbe
          elif [ -x "$HOME/.local/bin/qbe" ]; then
            true
          else
            sudo apt-get install -y build-essential git make
            git clone git://c9x.me/qbe.git "$RUNNER_TEMP/qbe"
            make -C "$RUNNER_TEMP/qbe"
            make -C "$RUNNER_TEMP/qbe" PREFIX="$HOME/.local" install
          fi
          qbe --version || true

      - name: Cache Donna packages
        uses: actions/cache@v4
        with:
          path: ~/.donna/packages
          key: donna-packages-${{ runner.os }}-${{ hashFiles('donna.lock') }}
          restore-keys: |
            donna-packages-${{ runner.os }}-

      - name: Install Donna
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/donna-lang/donna/releases/latest"
          url=$(curl -fsSL "$api" | grep browser_download_url | grep -E 'linux.*(x86_64|amd64).*\.(tar\.gz|tgz|zip)' | head -n 1 | cut -d '"' -f 4)
          if [ -z "$url" ]; then
            echo "Could not find a Linux x86_64 Donna release artifact in donna-lang/donna" >&2
            exit 1
          fi
          mkdir -p "$HOME/.donna/bin" donna-release
          curl -fsSL "$url" -o donna-release/archive
          case "$url" in
            *.zip) unzip -q donna-release/archive -d donna-release ;;
            *) tar -xzf donna-release/archive -C donna-release ;;
          esac
          bin=$(find donna-release -type f -name donna -perm -111 | head -n 1)
          if [ -z "$bin" ]; then
            echo "Donna binary not found in release artifact" >&2
            exit 1
          fi
          cp "$bin" "$HOME/.donna/bin/donna"
          chmod +x "$HOME/.donna/bin/donna"
          echo "$HOME/.donna/bin" >> "$GITHUB_PATH"

      - name: Build Leaf
        shell: bash
        run: |
          git clone https://github.com/NikolasSkyl/leaf /tmp/leaf
          cd /tmp/leaf
          donna build

      - name: Build website
        run: |
          cd website
          /tmp/leaf/build/bin/leaf build

      - name: Prefix links for project Pages
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" != "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            prefix="/$repo_name"
            find website/public -type f \( -name '*.html' -o -name '*.xml' -o -name '*.webmanifest' \) -print0 \
              | xargs -0 perl -pi -e "s#(href|src|content)=\"/#\$1=\"$prefix/#g"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
